<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mulah Rewards - Summary</title>
    <meta name="description" content="Review your Mulah Rewards registration details and loyalty points summary.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: #f7f7f9;
            color: #2d2d2d;
            -webkit-font-smoothing: antialiased;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .phone-container {
            width: 640px;
            height: 1136px;
            max-width: 100vw;
            max-height: 100vh;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.08);
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 60px 40px 40px;
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo h1 {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: 8px;
            background: linear-gradient(135deg, #c0392b, #e67e22);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
        }

        .page-title {
            font-size: 34px;
            font-weight: 300;
            color: #2d2d2d;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .page-subtitle {
            font-size: 15px;
            font-weight: 400;
            color: #888;
            font-style: italic;
            margin-bottom: 44px;
        }

        /* Success icon */
        .success-icon {
            text-align: center;
            margin-bottom: 36px;
        }

        .success-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f39c12, #e67e22);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(230, 126, 34, 0.3);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .success-circle svg {
            width: 40px;
            height: 40px;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Details card */
        .details-card {
            background: #fafafa;
            border-radius: 16px;
            padding: 28px 24px;
            border: 1px solid #eee;
            animation: slideUp 0.4s ease 0.2s both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 16px 0;
            border-bottom: 1px solid #eee;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            font-size: 14px;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            flex-shrink: 0;
            min-width: 100px;
        }

        .detail-value {
            font-size: 16px;
            font-weight: 600;
            color: #2d2d2d;
            text-align: right;
            word-break: break-word;
        }

        .spacer {
            flex: 1;
        }

        .btn-container {
            padding: 0 0 30px;
        }

        .btn-primary {
            width: 100%;
            padding: 18px;
            font-size: 17px;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, #f39c12, #e67e22);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.5px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 6px 20px rgba(230, 126, 34, 0.35);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(230, 126, 34, 0.45);
        }

        .btn-primary:active {
            transform: translateY(0);
            box-shadow: 0 4px 12px rgba(230, 126, 34, 0.3);
        }

        .footer {
            text-align: center;
            padding: 20px 40px 30px;
            font-size: 13px;
            color: #999;
        }

        .footer a {
            color: #e67e22;
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <div class="content">
            <div class="logo">
                <h1>Mulah</h1>
            </div>

            <h2 class="page-title">Summary</h2>
            <p class="page-subtitle">Please review your registration details.</p>

            <div class="success-icon">
                <div class="success-circle">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </div>
            </div>

            <div class="details-card">
                <div class="detail-row">
                    <span class="detail-label">Phone</span>
                    <span class="detail-value" id="summary-phone">—</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Name</span>
                    <span class="detail-value" id="summary-name">—</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Birthday</span>
                    <span class="detail-value" id="summary-birthday">—</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Email</span>
                    <span class="detail-value" id="summary-email">—</span>
                </div>
            </div>

            <div class="spacer"></div>

            <div class="btn-container">
                <button type="button" class="btn-primary" id="btn-done">Done</button>
            </div>
        </div>

        <div class="footer">
            Powered by <a href="#">MulahRewards.com</a>
        </div>
    </div>

    <script>
        (function() {
            // Populate from localStorage
            const phone = localStorage.getItem('mulah_phone') || '—';
            const name = localStorage.getItem('mulah_name') || '—';
            const birthday = localStorage.getItem('mulah_birthday') || '—';
            const email = localStorage.getItem('mulah_email') || '—';

            document.getElementById('summary-phone').textContent = phone;
            document.getElementById('summary-name').textContent = name;
            document.getElementById('summary-birthday').textContent = birthday;
            document.getElementById('summary-email').textContent = email;

            // Done button — clear data and return to page 1
            document.getElementById('btn-done').addEventListener('click', function() {
                localStorage.removeItem('mulah_phone');
                localStorage.removeItem('mulah_name');
                localStorage.removeItem('mulah_birthday');
                localStorage.removeItem('mulah_email');
                window.location.href = 'page1.html';
            });
        })();
    </script>
</body>
</html>
